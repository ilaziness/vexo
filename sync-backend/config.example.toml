# Sync Backend Configuration

[server]
host = "0.0.0.0"
port = 8080

[data]
data_dir = "./data/files"
max_versions = 5

# SQLite 配置（默认）
[data.database]
type = "sqlite"
db_path = "./data/sync.db"

